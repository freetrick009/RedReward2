<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verification</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("assets/background.jpg") no-repeat center center;
background-size:cover;
overflow:hidden;
position:relative;
}

body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(5px);
}

.popup{
position:relative;
width:90%;
max-width:370px;
background:#fff;
padding:35px 28px;
border-radius:28px;
text-align:center;
box-shadow:0 25px 60px rgba(0,0,0,.35);
animation:popup .6s cubic-bezier(.18,1.2,.32,1);
z-index:10;
}

.popup::after{
content:"";
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:280px;
height:280px;
background:radial-gradient(circle,#ffd54a55,transparent 70%);
z-index:-1;
filter:blur(30px);
}

h2{
font-size:40px;
color:#c00000;
margin-bottom:20px;
}

p{
font-size:20px;
color:#555;
line-height:1.6;
margin-bottom:30px;
}

button{
width:100%;
height:58px;
border:none;
border-radius:40px;
background:linear-gradient(#ffd84d,#ffbf00);
color:#7b0000;
font-size:24px;
font-weight:bold;
cursor:pointer;
position:relative;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,.25);
transition:.25s;
}

button:hover{
transform:scale(1.03);
}

button::before{
content:"";
position:absolute;
top:0;
left:-120%;
width:70%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.8),transparent);
animation:shine 2s infinite;
}

@keyframes popup{
0%{
transform:translateY(80px) scale(.8);
opacity:0;
}
70%{
transform:translateY(-8px) scale(1.03);
}
100%{
transform:translateY(0) scale(1);
opacity:1;
}
}

@keyframes shine{
100%{
left:150%;
}
}

</style>
</head>

<body>

<div class="popup">

<h2>⚠ Verification Required</h2>

<p>
Complete the required steps before claiming your cashback.
</p>

<button onclick="window.location.href='channels.html'">
Continue
</button>

</div>

</body>
</html>
