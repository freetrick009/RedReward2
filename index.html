<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Red Rewards</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="overlay"></div>

<div class="container">

<h2>
ENTER YOUR DETAILS TO PARTICIPATE
</h2>

<form id="rewardForm">

<input
type="text"
id="batch"
placeholder="Batch Code"
required>

<input
type="tel"
id="mobile"
placeholder="Mobile Number"
maxlength="10"
required>

<select id="state" required>

<option value="">Select State</option>

<option>Maharashtra</option>
<option>Delhi</option>
<option>Gujarat</option>
<option>Karnataka</option>
<option>Tamil Nadu</option>
<option>West Bengal</option>

</select>

<select id="city" required>

<option value="">Select City</option>

</select>

<label class="terms">

<input
type="checkbox"
id="agree"
required>

<span>

By proceeding I confirm that I am above 18+ years and agree to Nestle Terms and Conditions. I understand that my personal data will be processed in accordance with the Nestle Privacy Policy. I understand that I can withdraw my consent at any time.
<b>Terms & Conditions</b>.

</span>

</label>

<button
type="submit"
class="continue-btn">

CONTINUE ❯

</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
