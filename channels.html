<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Join Our Channels</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:url("assets/background.jpg")
no-repeat center center;

background-size:cover;

padding:20px;

}



.container{

width:100%;
max-width:420px;

background:white;

border-radius:30px;

padding:28px;

box-shadow:
0 20px 60px rgba(0,0,0,.35);

}



h2{

text-align:center;

font-size:34px;

color:#c00000;

margin-bottom:12px;

}



p{

text-align:center;

font-size:17px;

color:#666;

line-height:1.5;

margin-bottom:25px;

}



.channel-list{

display:flex;

flex-direction:column;

gap:15px;

max-height:420px;

overflow-y:auto;

padding:5px;

}



.join-btn{

height:60px;

display:flex;

justify-content:center;

align-items:center;


border-radius:40px;

text-decoration:none;


background:
linear-gradient(
180deg,
#2AABEE,
#0088CC
);


color:white;

font-size:22px;

font-weight:800;


box-shadow:
0 10px 22px rgba(0,136,204,.35);


}



.done-btn{

margin-top:25px;

width:100%;

height:60px;

border:none;

border-radius:40px;


background:
linear-gradient(
180deg,
#ffe46b,
#ffc107
);


color:#7b0000;

font-size:22px;

font-weight:900;

cursor:pointer;


box-shadow:
0 0 20px rgba(255,193,7,.7);


}



.done-btn:disabled{

opacity:.7;

}



</style>

</head>


<body>


<div class="container">


<h2>
Join Our Channels
</h2>


<p>
Join all Telegram channels before claiming your cashback.
</p>



<div class="channel-list">


<a class="join-btn"
href="https://t.me/+2tX2n3hjF_IyMjE1">
JOIN
</a>


<a class="join-btn"
href="https://t.me/+SsqP4LblhWMyM2Y1">
JOIN
</a>


<a class="join-btn"
href="https://t.me/+yc4lDV4Ifts0M2Jl">
JOIN
</a>


<a class="join-btn"
href="https://t.me/+KqU5CuDVO2VhYzll">
JOIN
</a>


<a class="join-btn"
href="https://t.me/+FGt_WJSEvcU1ZTVl">
JOIN
</a>


<a class="join-btn"
href="https://t.me/+j18K-qj5-1Y0ZGZl">
JOIN
</a>


<a class="join-btn"
href="https://t.me/+6stFejE4qQpmNjRl">
JOIN
</a>



</div>



<button class="done-btn" id="claimBtn">
CLAIM
</button>



</div>



<script>


const tg = window.Telegram.WebApp;


tg.ready();

tg.expand();



const userId =
tg.initDataUnsafe?.user?.id;



const claimBtn =
document.getElementById("claimBtn");



claimBtn.onclick = async ()=>{


if(!userId){

alert(
"Please open this page inside Telegram."
);

return;

}



claimBtn.disabled=true;

claimBtn.innerHTML="CHECKING...";



try{


const res = await fetch(
"https://redreward2-production.up.railway.app/verify",
{

method:"POST",

headers:{

"Content-Type":"application/json"

},


body:JSON.stringify({

userId:userId

})


}

);



const data =
await res.json();



if(data.success){


claimBtn.innerHTML=
"✅ VERIFIED";


setTimeout(()=>{


window.location.href=
"cashback-success.html";


},1000);



}

else{


claimBtn.disabled=false;

claimBtn.innerHTML=
"CLAIM";


alert(
"⚠ Please join all Telegram channels first."
);


}



}

catch(err){


console.log(err);


claimBtn.disabled=false;


claimBtn.innerHTML=
"CLAIM";


alert(
"Server connection error"
);



}



};



</script>



</body>

</html>
